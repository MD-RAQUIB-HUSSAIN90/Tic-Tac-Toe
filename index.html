<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
<nav>
  <div class="logo">🎮 Tic Tac Toe</div>

  <button id="soundBtn">🔊</button>
</nav>

<div class="gameContainer">

  <div class="container">

    <div class="box bt-0 bl-0"><span class="boxtext"></span></div>
    <div class="box bt-0"><span class="boxtext"></span></div>
    <div class="box bt-0 br-0"><span class="boxtext"></span></div>

    <div class="box bl-0"><span class="boxtext"></span></div>
    <div class="box"><span class="boxtext"></span></div>
    <div class="box br-0"><span class="boxtext"></span></div>

    <div class="box bb-0 bl-0"><span class="boxtext"></span></div>
    <div class="box bb-0"><span class="boxtext"></span></div>
    <div class="box bb-0 br-0"><span class="boxtext"></span></div>

  </div>

  <div class="gameInfo">

    <h1>Tic Tac Toe</h1>

    <div class="scoreBoard">
      <div>X : <span id="xScore">0</span></div>
      <div>O : <span id="oScore">0</span></div>
      <div>Draw : <span id="drawScore">0</span></div>
    </div>

    <div class="infoBox">
      <span class="info">Turn for X</span>

      <div class="btns">
        <button id="reset">Reset</button>
        <button id="newGame">New Game</button>
      </div>

    </div>

    <div class="image">
      <img src="excited.gif">
    </div>

  </div>

</div>
    <script src="script.js"></script>
  </body>
</html>
